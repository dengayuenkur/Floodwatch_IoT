services:
  - type: web
    name: flood-monitoring-system
    runtime: python
    rootDir: server
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gthread --workers 1 --threads 8 -b 0.0.0.0:$PORT "app:create_app('production')"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SENSOR_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev
      # Secrets below are NOT stored in this file (public repo). Set the
      # real values in the Render dashboard: service -> Environment.
      - key: RESEND_API_KEY
        sync: false
      - key: ALERT_EMAILS
        sync: false
